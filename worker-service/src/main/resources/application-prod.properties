# ============================================================
# application-prod.properties — Worker Service
# Configuración para perfil de producción usando H2 en memoria
# con modo de compatibilidad Oracle.
# ============================================================

# Configuración limpia para H2 en memoria (Simulación Oracle)
spring.datasource.url=jdbc:h2:mem:cursosdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2 (opcional para depuración)
spring.h2.console.enabled=false
