server:
  port: 8081

spring:
  application:
    name: worker-service

  # ── Oracle Cloud — Spring Data JPA ─────────────────────────────────────
  # Todas las credenciales se inyectan por variables de entorno.
  # Formato de URL directa (sin billetera):
  #   jdbc:oracle:thin:@//<host>:<port>/<service_name>
  # Formato con Oracle Wallet (recomendado para Oracle Cloud ATP):
  #   jdbc:oracle:thin:@<alias>?TNS_ADMIN=/opt/oracle/wallet
  datasource:
    url:      ${SPRING_DATASOURCE_URL:${ORACLE_DB_URL:jdbc:h2:mem:cursosdb;DB_CLOSE_DELAY=-1;MODE=Oracle}}
    username: ${SPRING_DATASOURCE_USERNAME:${ORACLE_DB_USER:sa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${ORACLE_DB_PASSWORD:}}
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  # Las mismas variables que usa el BFF Service para consistencia
  rabbitmq:
    host:         ${RABBITMQ_HOST:localhost}
    port:         ${RABBITMQ_PORT:5672}
    username:     ${RABBITMQ_USERNAME:guest}
    password:     ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        # acknowledge-mode: manual permite ack explícito tras procesamiento exitoso
        # auto: más simple, hace ack automático al retornar del listener
        acknowledge-mode: auto
        # Reintentos ante fallo de conexión inicial al broker
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 5
          multiplier: 2.0

# ── AWS S3 ─────────────────────────────────────────────────────────────────
# Propiedades personalizadas para el CloudStorageService.
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY y AWS_SESSION_TOKEN son leídas
# automáticamente por DefaultCredentialsProvider del AWS SDK v2 desde
# el entorno del proceso — NO se declaran aquí.
aws:
  s3:
    region:      ${AWS_S3_REGION:us-east-1}
    bucket-name: ${AWS_S3_BUCKET_NAME:bucket-cursos-inscripciones}

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.sistema.cursos.worker: DEBUG
    org.springframework.amqp:  INFO
    org.hibernate.SQL:         WARN
    com.zaxxer.hikari:         WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
