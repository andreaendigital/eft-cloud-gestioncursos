name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar y ejecutar tests
        run: mvn clean package --batch-mode --no-transfer-progress

      - name: Subir JARs como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: jars-compilados
          path: |
            bff-service/target/*.jar
            worker-service/target/*.jar
          retention-days: 5

  docker-build-push:
    name: Build and Push Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Empaquetar JARs sin tests
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push bff-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./bff-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bff-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bff-service:${{ github.sha }}
          cache-from: type=gha,scope=bff-service
          cache-to: type=gha,scope=bff-service,mode=max

      - name: Build y Push worker-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./worker-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/worker-service:${{ github.sha }}
          cache-from: type=gha,scope=worker-service
          cache-to: type=gha,scope=worker-service,mode=max

  deploy-ec2:
    name: Deploy en AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "~/gestion-cursos/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        env:
          AZURE_AD_ISSUER_URI: ${{ secrets.AZURE_AD_ISSUER_URI }}
          AZURE_AD_JWKS_URI: ${{ secrets.AZURE_AD_JWKS_URI }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 300s
          envs: AZURE_AD_ISSUER_URI,AZURE_AD_JWKS_URI,AZURE_CLIENT_ID,RABBITMQ_USERNAME,RABBITMQ_PASSWORD,AWS_S3_REGION,AWS_S3_BUCKET_NAME,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,DOCKERHUB_USERNAME
          script: |
            set -e

            echo "Iniciando deploy - Commit: ${{ github.sha }}"

            mkdir -p ~/gestion-cursos

            echo "AZURE_AD_ISSUER_URI=${AZURE_AD_ISSUER_URI}" > ~/gestion-cursos/.env
            echo "AZURE_AD_JWKS_URI=${AZURE_AD_JWKS_URI}" >> ~/gestion-cursos/.env
            echo "AZURE_CLIENT_ID=${AZURE_CLIENT_ID}" >> ~/gestion-cursos/.env
            echo "RABBITMQ_USERNAME=${RABBITMQ_USERNAME}" >> ~/gestion-cursos/.env
            echo "RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}" >> ~/gestion-cursos/.env
            echo "ORACLE_DB_URL=jdbc:h2:mem:cursosdb;DB_CLOSE_DELAY=-1;MODE=Oracle" >> ~/gestion-cursos/.env
            echo "ORACLE_DB_USER=sa" >> ~/gestion-cursos/.env
            echo "ORACLE_DB_PASSWORD=" >> ~/gestion-cursos/.env
            echo "AWS_S3_REGION=${AWS_S3_REGION}" >> ~/gestion-cursos/.env
            echo "AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}" >> ~/gestion-cursos/.env
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> ~/gestion-cursos/.env
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> ~/gestion-cursos/.env
            echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}" >> ~/gestion-cursos/.env
            echo "DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}" >> ~/gestion-cursos/.env

            echo "Variables de entorno escritas en .env"

            docker pull ${DOCKERHUB_USERNAME}/bff-service:latest
            docker pull ${DOCKERHUB_USERNAME}/worker-service:latest

            cd ~/gestion-cursos

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Deploy finalizado exitosamente"
