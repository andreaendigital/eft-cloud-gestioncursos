version: '3.8'

# ============================================================
# docker-compose.prod.yml — Despliegue en AWS EC2
# Red interna "cursos-net" compartida por todos los servicios.
# El BFF resuelve "worker-service:8081" por nombre DNS de Docker.
# ============================================================

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-cursos
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cursos-net

  worker-service:
    image: ${DOCKERHUB_USERNAME}/worker-service:latest
    container_name: worker-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      # Comillas dobles obligatorias: la URL Oracle tiene paréntesis y = que
      # Docker interpreta como operadores si no están entre comillas.
      SPRING_DATASOURCE_URL: "${ORACLE_DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${ORACLE_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${ORACLE_DB_PASSWORD}"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: "${RABBITMQ_USERNAME:-guest}"
      SPRING_RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN}"
      AWS_S3_REGION: "${AWS_S3_REGION:-us-east-1}"
      AWS_S3_BUCKET_NAME: "${AWS_S3_BUCKET_NAME}"
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cursos-net
    # Healthcheck para que el BFF espere a que el Worker esté listo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  bff-service:
    image: ${DOCKERHUB_USERNAME}/bff-service:latest
    container_name: bff-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${AZURE_AD_ISSUER_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${AZURE_AD_JWKS_URI}
      AZURE_AD_CLIENT_ID: ${AZURE_CLIENT_ID}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      WORKER_SERVICE_URL: http://worker-service:8081
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      rabbitmq:
        condition: service_healthy
      worker-service:
        condition: service_healthy
    networks:
      - cursos-net

networks:
  cursos-net:
    driver: bridge

volumes:
  rabbitmq_data:
    driver: local
